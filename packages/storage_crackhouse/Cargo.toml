[package]
name = "storage_crackhouse"
version.workspace = true
authors.workspace = true
edition.workspace = true

[dependencies]
tracing.workspace=true
serde_json = "*"

api_asscrack = {path="../api_asscrack"}
_crack_utils = {path="../_crack_utils"}
anyhow.workspace = true


rusqlite = { version = "0.38.0", features = ["bundled", "serde_json", "chrono"] }
# sea-orm-sync = {version = "=2.0.0-rc.38", features = ["rusqlite", "entity-registry", "schema-sync"]}

# sea-orm-sync = {path="../../../sea-orm/sea-orm-sync",  features = ["rusqlite", "entity-registry", "schema-sync"]}
# sea-orm-sync = {git="https://github.com/johnny-smitherson/sea-orm", branch="remove-instant-now",  features = ["rusqlite", "entity-registry", "schema-sync"]}
# sea-query = { version = "=1.0.0-rc.33", default-features = false, features = [
#     "thread-safe",
#     "hashable-value",
#     "backend-mysql",
#     "backend-postgres",
#     "backend-sqlite",
#     "sea-orm",
#     "serde",
# ] }

# diesel = { version = "2.3.2",  features = ["sqlite", "returning_clauses_for_sqlite_3_35"] }
# diesel_migrations = { version = "2.3.2", features = ["sqlite"] }
serde = { version = "1.0.217", features = ["derive"] }
serde-wasm-bindgen = "0.6.5"
wasm-bindgen = "0.2.99"
wasm-bindgen-futures = "0.4.49"

lazy_static = "1.5.0"
tokio = {version="1", default-features = false, features=["sync"]}


[target.'cfg(all(target_family = "wasm", target_os = "unknown"))'.dependencies]
sqlite-wasm-vfs = "0.2.0"
sqlite-wasm-rs = "0.5.2"