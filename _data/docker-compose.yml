services:
  crack_nginx_data:
    container_name: crack_nginx_data
    image: docker.io/nginx:1.30.2
    volumes:
      - type: bind
        source: ./nginx.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
      - ./:/data:ro
    ports:
      - 127.0.0.1:8081:8081
    network_mode: host

